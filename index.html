<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compartir PNG — Imagen rápida</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;max-width:820px;margin:32px auto;padding:0 16px;color:#111}
    header{margin-bottom:18px}
    .preview{margin-top:18px}
    img{max-width:100%;height:auto;border:1px solid #ddd;padding:6px;background:#fff}
    input[type=text]{width:100%;padding:8px;margin-top:8px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    button, a.button{background:#0366d6;color:white;border:none;padding:8px 12px;border-radius:6px;text-decoration:none;display:inline-block}
    .note{color:#444;font-size:0.9rem;margin-top:10px}
  </style>
</head>
<body>
  <header>
    <h1>Compartir una imagen PNG</h1>
    <p>Carga un archivo PNG y genera un enlace que cualquiera puede abrir para ver la imagen.</p>
  </header>

  <main>
    <label>
      Seleccionar PNG:
      <input id="fileInput" type="file" accept="image/png" />
    </label>

    <div class="preview" id="previewArea" style="display:none">
      <h2>Previsualización</h2>
      <img id="imgPreview" alt="Previsualización de la imagen" />

      <div style="margin-top:12px">
        <label>Enlace compartible (cópialo y envíalo):</label>
        <input id="dataUrl" type="text" readonly />
      </div>

      <div class="row">
        <a id="openLink" class="button" href="#" target="_blank">Abrir en nueva pestaña</a>
        <a id="downloadLink" class="button" href="#">Descargar PNG</a>
        <button id="clearBtn" type="button">Borrar</button>
      </div>

      <p class="note">Nota: El enlace es una <em>data URL</em> (base64). Puede ser largo pero funciona sin servidor.</p>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const imgPreview = document.getElementById('imgPreview');
    const dataUrlInput = document.getElementById('dataUrl');
    const openLink = document.getElementById('openLink');
    const downloadLink = document.getElementById('downloadLink');
    const clearBtn = document.getElementById('clearBtn');

    fileInput.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      if (f.type !== 'image/png') {
        alert('Por favor selecciona un archivo PNG.');
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        imgPreview.src = dataUrl;
        dataUrlInput.value = dataUrl;
        openLink.href = dataUrl;
        downloadLink.href = dataUrl;
        downloadLink.download = f.name || 'image.png';
        previewArea.style.display = 'block';
      };
      reader.readAsDataURL(f);
    });

    clearBtn.addEventListener('click', () => {
      fileInput.value = '';
      imgPreview.src = '';
      dataUrlInput.value = '';
      openLink.href = '#';
      downloadLink.href = '#';
      previewArea.style.display = 'none';
    });
  </script>
</body>
</html>
